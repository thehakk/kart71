services:
  - type: web
    name: kart71-server
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build --workspace server
    startCommand: node server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://kart71.vercel.app
      - key: NODE_VERSION
        value: 22.16.0
